name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  contract:
    name: Build Rust Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
          components: clippy
      - name: Build contract
        working-directory: ./contract
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Run tests
        working-directory: ./contract
        run: cargo test
      - name: Format check
        working-directory: ./contract
        run: cargo fmt --all -- --check
      - name: Run clippy lint
        working-directory: ./contract
        run: cargo clippy --all-targets -- -D warnings
  client:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
        working-directory: ./client
      - name: Lint
        working-directory: ./client
        run: npx eslint . || true
      - name: Build
        working-directory: ./client
        run: npx next build
